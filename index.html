<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAXSTORE TOPUP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* KUNCI LAYAR AGAR TIDAK BERGESER */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body { 
            background-color: #020617; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden; /* Anti geser kanan-kiri */
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100dvh; /* Pas di layar HP */
        }
        
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); border-color: rgba(56, 189, 248, 0.3); }
            50% { box-shadow: 0 0 40px rgba(56, 189, 248, 0.6); border-color: rgba(56, 189, 248, 0.8); }
            100% { box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); border-color: rgba(56, 189, 248, 0.3); }
        }

        .hero-section {
            padding: 40px 20px 10px;
            display: flex;
            justify-content: center;
            flex-shrink: 0;
        }

        /* PERBAIKAN: Judul & Slogan dengan Background Gambar Lokal */
        .brand-card {
            width: 100%;
            max-width: 400px;
            padding: 35px 20px;
            background: #0f172a;
            border: 2px solid rgba(56, 189, 248, 0.4);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            text-align: center;
            animation: pulse-glow 3s infinite ease-in-out;
        }

        .brand-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('header-bg.jpg'); /* Pastikan file ada di folder */
            background-size: cover;
            background-position: center;
            z-index: 1;
            filter: brightness(0.4);
        }

        .brand-content {
            position: relative;
            z-index: 2;
        }

        .brand-name {
            color: #38bdf8; 
            font-weight: 900; 
            font-size: 42px; 
            letter-spacing: -2px; 
            margin: 0;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.6);
        }

        .brand-slogan {
            color: #f1f5f9; 
            font-size: 13px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin-top: 8px;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;
            padding: 20px;
            background: radial-gradient(circle at center, rgba(30, 41, 59, 0.5) 0%, transparent 70%);
        }

        .game-card {
            width: 200px;
            height: 200px;
            background: #0f172a;
            border: 2px solid rgba(56, 189, 248, 0.3);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: 0.3s;
            animation: pulse-glow 3s infinite ease-in-out;
            position: relative;
        }

        .game-card:active { transform: scale(0.95); }

        .game-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .overlay-shadow {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            z-index: 4;
        }

        .card-info {
            position: absolute;
            bottom: 15px; 
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .game-title {
            font-size: 18px; 
            font-weight: 900;
            color: white;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .bottom-payment {
            flex-shrink: 0;
            padding: 25px 15px;
            text-align: center;
            background: #0f172a;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .pay-logo { height: 18px; }
        .seabank-text { color: #ff6a00; font-weight: 900; font-size: 16px; }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="brand-card">
            <div class="brand-bg"></div>
            <div class="brand-content">
                <h1 class="brand-name">LAXSTORE</h1>
                <p class="brand-slogan">TOPUP SATSET ANTI MACET</p>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="game-card" onclick="window.location.href='https://topupepep.netlify.app'">
            <img src="ff.jpg" class="game-img" alt="Free Fire">
            <div class="overlay-shadow"></div>
            <div class="card-info">
                <h2 class="game-title">FREE FIRE</h2>
            </div>
        </div>

        <div class="game-card" onclick="window.location.href='https://topupemel.netlify.app'">
            <img src="ml.jpeg" class="game-img" alt="Mobile Legends">
            <div class="overlay-shadow"></div>
            <div class="card-info">
                <h2 class="game-title">MOBILE LEGENDS</h2>
            </div>
        </div>
    </div>

    <div class="bottom-payment">
        <p style="font-size: 10px; color: #64748b; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;">Metode Pembayaran</p>
        <div class="flex justify-center items-center gap-5 mt-3">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a2/Logo_QRIS.svg" class="pay-logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/72/Logo_dana_blue.svg" class="pay-logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/86/Gopay_logo.svg" class="pay-logo">
            <span class="seabank-text">🏦SeaBank</span>
        </div>
    </div>

</body>
</html>
