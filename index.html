<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAXSTORE TOPUP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* LOCK TOTAL: Anti Geser */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body { 
            margin: 0; 
            padding: 0;
            width: 100vw;
            height: 100dvh; 
            overflow: hidden; 
            background-color: #020617; 
        }

        body {
            display: flex;
            flex-direction: column;
            font-family: 'Inter', sans-serif;
            color: white;
            
            /* BACKGROUND UTAMA TERANG */
            background-image: linear-gradient(rgba(2, 6, 23, 0.4), rgba(2, 6, 23, 0.4)), url('main-bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); border-color: rgba(56, 189, 248, 0.3); }
            50% { box-shadow: 0 0 40px rgba(56, 189, 248, 0.6); border-color: rgba(56, 189, 248, 0.8); }
            100% { box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); border-color: rgba(56, 189, 248, 0.3); }
        }

        .hero-section {
            flex: 0 0 auto;
            padding: 25px 10px 5px; /* Padding samping dikecilkan agar card bisa lebar */
            display: flex;
            justify-content: center;
        }

        /* PERLEBAR KOTAK JUDUL (BRAND CARD) */
        .brand-card {
            width: 95%; /* Diperlebar dari sebelumnya */
            max-width: 500px; /* Batas maksimal lebar */
            padding: 45px 20px; /* Padding atas-bawah ditambah agar lebih gagah */
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 2.5px solid rgba(56, 189, 248, 0.5); /* Border sedikit lebih tebal */
            border-radius: 28px;
            position: relative;
            overflow: hidden;
            text-align: center;
            animation: pulse-glow 3s infinite ease-in-out;
        }

        .brand-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('brand-bg.jpg'); 
            background-size: cover;
            background-position: center;
            z-index: 1;
            filter: brightness(0.70) contrast(1.1);
        }

        .brand-content { position: relative; z-index: 2; }

        .brand-name {
            color: #38bdf8; 
            font-weight: 900; 
            font-size: 48px; 
            letter-spacing: -2px; 
            margin: 0;
            line-height: 1;

            /* EFEK BAYANGAN MULTI-LAYER (GLOWING) */
            text-shadow: 
                2px 2px 0px rgba(0, 0, 0, 0.8),      /* Bayangan tajam hitam agar teks tegas */
                0 0 10px rgba(56, 189, 248, 0.8),    /* Cahaya dalam (Glow tipis) */
                0 0 25px rgba(56, 189, 248, 0.5);    /* Cahaya luar (Glow lebar) */
        }

        .brand-slogan {
            color: #f1f5f9; 
            font-size: 13px; /* Slogan sedikit lebih besar */
            text-transform: uppercase; 
            letter-spacing: 4px; 
            margin-top: 10px;
            font-weight: 800;
            opacity: 0.9;
        }

        .main-wrapper {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 10px;
        }

        .game-card {
            width: 190px; 
            height: 190px;
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid rgba(56, 189, 248, 0.3);
            border-radius: 26px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
            animation: pulse-glow 3s infinite ease-in-out;
            position: relative;
        }

        .game-card:active { transform: scale(0.95); }

        .game-img {
            width: 100%; height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0; left: 0;
        }

        .overlay-shadow {
            position: absolute;
            bottom: 0; width: 100%; height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            z-index: 4;
        }

        .card-info {
            position: absolute;
            bottom: 12px; width: 100%;
            display: flex; justify-content: center; z-index: 5;
        }

        .game-title {
            font-size: 18px; 
            font-weight: 900;
            color: white;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .bottom-payment {
            flex: 0 0 auto;
            padding: 20px 15px;
            text-align: center;
            background: rgba(15, 23, 42, 0.95);
            border-top: 2px solid rgba(56, 189, 248, 0.2);
            backdrop-filter: blur(15px);
        }

        .pay-logo { height: 16px; }
        .seabank-text { color: #ff6a00; font-weight: 900; font-size: 16px; }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="brand-card">
            <div class="brand-bg"></div>
            <div class="brand-content">
                <h1 class="brand-name">LAXSTORE</h1>
                <p class="brand-slogan">TOPUP SATSET ANTI MACET</p>
            </div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="game-card" onclick="window.location.href='https://laxsff.netlify.app'">
            <img src="ff.jpg" class="game-img" alt="Free Fire">
            <div class="overlay-shadow"></div>
            <div class="card-info">
                <h2 class="game-title">FREE FIRE</h2>
            </div>
        </div>

        <div class="game-card" onclick="window.location.href='https://laxsml.netlify.app'">
            <img src="ml.jpeg" class="game-img" alt="Mobile Legends">
            <div class="overlay-shadow"></div>
            <div class="card-info">
                <h2 class="game-title">MOBILE LEGENDS</h2>
            </div>
        </div>
    </div>

    <div class="bottom-payment">
        <p style="font-size: 10px; color: #94a3b8; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;">Metode Pembayaran</p>
        <div class="flex justify-center items-center gap-5 mt-3">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a2/Logo_QRIS.svg" class="pay-logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/72/Logo_dana_blue.svg" class="pay-logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/86/Gopay_logo.svg" class="pay-logo">
            <span class="seabank-text">🏦SeaBank</span>
        </div>
    </div>

</body>
</html>
