<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAXSTORE TOPUP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { 
            background-color: #020617; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); border-color: rgba(56, 189, 248, 0.3); }
            50% { box-shadow: 0 0 40px rgba(56, 189, 248, 0.6); border-color: rgba(56, 189, 248, 0.8); }
            100% { box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); border-color: rgba(56, 189, 248, 0.3); }
        }

        .hero-section {
            padding: 60px 20px 30px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(15, 23, 42, 0.9), transparent);
            border-bottom: 1px solid rgba(56, 189, 248, 0.1);
        }

        .brand-name {
            color: #38bdf8; 
            font-weight: 900; 
            font-size: 42px; 
            letter-spacing: -2px; 
            margin: 0;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
        }

        .brand-slogan {
            color: #94a3b8; 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin-top: 8px;
            font-weight: 600;
        }

        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;
            padding: 40px 20px;
            background: radial-gradient(circle at center, rgba(30, 41, 59, 0.5) 0%, transparent 70%);
        }

        .game-card {
            width: 200px;
            height: 200px;
            background: #0f172a;
            border: 2px solid rgba(56, 189, 248, 0.3);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: 0.3s;
            animation: pulse-glow 3s infinite ease-in-out;
            position: relative;
        }

        .game-card:active { transform: scale(0.95); }

        .hot-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 20px;
            z-index: 10;
            filter: drop-shadow(0 0 5px rgba(255, 69, 0, 0.8));
        }

        .game-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Gradasi bayangan agar teks besar lebih mudah dibaca */
        .overlay-shadow {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            z-index: 4;
        }

        .card-info {
            position: absolute;
            bottom: 15px; 
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            z-index: 5;
        }

        /* PERUBAHAN: Text diperbesar signifikan */
        .game-title {
            font-size: 18px; /* Diperbesar dari 12px */
            font-weight: 900;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
            padding: 0 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .bottom-payment {
            padding: 25px 15px;
            text-align: center;
            background: #0f172a;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .payment-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .pay-logo { height: 18px; }
        
        .seabank-text {
            color: #ff6a00; 
            font-weight: 900;
            font-size: 16px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <h1 class="brand-name">LAXSTORE</h1>
        <p class="brand-slogan">TOPUP SATSET ANTI MACET</p>
    </div>

    <div class="main-wrapper">
        
        <div class="game-card" onclick="window.location.href='https://topupepep.netlify.app'">
            <div class="hot-icon">🔥</div>
            <img src="ff.jpg" class="game-img" alt="Free Fire">
            <div class="overlay-shadow"></div>
            <div class="card-info">
                <h2 class="game-title">FREE FIRE</h2>
            </div>
        </div>

        <div class="game-card" onclick="window.location.href='https://topupemel.netlify.app'">
            <div class="hot-icon">🔥</div>
            <img src="ml.jpeg" class="game-img" alt="Mobile Legends">
            <div class="overlay-shadow"></div>
            <div class="card-info">
                <h2 class="game-title">MOBILE LEGENDS</h2>
            </div>
        </div>

    </div>

    <div class="bottom-payment">
        <p style="font-size: 10px; color: #64748b; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;">Metode Pembayaran</p>
        <div class="payment-bar">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a2/Logo_QRIS.svg" class="pay-logo" alt="QRIS">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/72/Logo_dana_blue.svg" class="pay-logo" alt="DANA">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/86/Gopay_logo.svg" class="pay-logo" alt="GOPAY">
            <span class="seabank-text">🏦SeaBank</span>
        </div>
    </div>

</body>
</html>
